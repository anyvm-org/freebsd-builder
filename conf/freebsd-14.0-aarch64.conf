

VM_VHD_LINK="https://archive.freebsd.org/old-releases/VM-IMAGES/14.0-RELEASE/aarch64/Latest/FreeBSD-14.0-RELEASE-arm64-aarch64.qcow2.xz"
VM_OS_NAME="freebsd"
VM_SSH_PORT=2222
VM_RELEASE=14.0

VM_LOGIN_TAG="64 (freebsd) (tty"

VM_SHUTDOWN_CMD="/sbin/shutdown -p now"

