# NOTE: 15.1 is not released yet -- this conf tracks the 15.1-RC3 VM image.
# When 15.1-RELEASE ships, point VM_VHD_LINK at
#   .../VM-IMAGES/15.1-RELEASE/aarch64/Latest/FreeBSD-15.1-RELEASE-arm64-aarch64-BASIC-CLOUDINIT-zfs.qcow2.xz
# (VM_RELEASE stays 15.1 so artifact names don't carry the RC tag).
#
# 15.1 switches to the BASIC-CLOUDINIT image variant: hooks/host_prepareImage.py
# generates a NoCloud seed ISO at build time (never committed to git) that
# bakes the host pubkey + sshd config via cloud-init on first boot, replacing
# the fragile console enable-ssh typing stage. See conf/freebsd-15.1.conf.

VM_VHD_LINK="https://download.freebsd.org/releases/VM-IMAGES/15.1-RC3/aarch64/Latest/FreeBSD-15.1-RC3-arm64-aarch64-BASIC-CLOUDINIT-zfs.qcow2.xz"
VM_CLOUDINIT=1

# First boot under TCG runs the whole cloud-init provisioning before the
# login prompt shows up; give it more headroom than the 600 s default so
# start_and_wait does not force-kill the VM mid-provisioning (a killed
# first boot leaves cloud-init half-run and the baked key missing).
VM_LOGIN_MAX_SECONDS=1500
VM_OS_NAME="freebsd"
VM_OS_TYPE="freebsd14.0"
VM_SSH_PORT=2222
VM_RELEASE=15.1

VM_LOGIN_TAG="64 (freebsd) (tty"

VM_SHUTDOWN_CMD="/sbin/shutdown -p now"

VM_INSTALL_CMD="IGNORE_OSVERSION=yes pkg  install  -y "

VM_RSYNC_PKG="rsync"
VM_SSHFS_PKG="fusefs-sshfs"

VM_PRE_INSTALL_PKGS="tree $VM_RSYNC_PKG $VM_SSHFS_PKG"

VM_ARCH="aarch64"

VM_OPTS="conf/freebsd-13.1.opts.txt"

VM_VBOX="./vbox.sh"

VM_VBOX_LINK="https://raw.githubusercontent.com/anyvm-org/vbox/v1.2.4/vbox.sh"
