# FreeBSD 15.1-RELEASE (aarch64).
#
# Unlike 15.1 amd64, aarch64 does NOT use the BASIC-CLOUDINIT image: under
# CI it runs in QEMU TCG emulation (no KVM on the amd64 runners), and the
# cloud-init aarch64 image never reaches the login prompt within the build
# window -- it wedges early at "Root mount waiting for: usbus0" / "lo0 link
# UP", before multiuser, so cloud-init's rc.d services never even start.
# The plain (non-cloudinit) image boots straight to login under TCG exactly
# like every other aarch64 release (13.5/14.3/14.4/15.0), so we keep the
# proven console enable-ssh path here.

VM_VHD_LINK="https://download.freebsd.org/releases/VM-IMAGES/15.1-RELEASE/aarch64/Latest/FreeBSD-15.1-RELEASE-arm64-aarch64-zfs.qcow2.xz"
VM_OS_NAME="freebsd"
VM_SSH_PORT=2222
VM_RELEASE=15.1

VM_LOGIN_TAG="64 (freebsd) (tty"

VM_SHUTDOWN_CMD="/sbin/shutdown -p now"

VM_INSTALL_CMD="IGNORE_OSVERSION=yes pkg  install  -y "

VM_RSYNC_PKG="rsync"
VM_SSHFS_PKG="fusefs-sshfs"

VM_PRE_INSTALL_PKGS="tree $VM_RSYNC_PKG $VM_SSHFS_PKG"

VM_ARCH="aarch64"

VM_OPTS="conf/freebsd-13.1.opts.txt"


