

VM_VHD_LINK="https://archive.freebsd.org/old-releases/VM-IMAGES/13.5-RELEASE/amd64/Latest/FreeBSD-13.5-RELEASE-amd64.qcow2.xz"
VM_OS_NAME="freebsd"
