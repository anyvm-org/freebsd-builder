# NOTE: 15.1 is not released yet -- this conf tracks the 15.1-RC3 VM image.
# When 15.1-RELEASE ships, point VM_VHD_LINK at
#   .../VM-IMAGES/15.1-RELEASE/amd64/Latest/FreeBSD-15.1-RELEASE-amd64-zfs.qcow2.xz
# (VM_RELEASE stays 15.1 so artifact names don't carry the RC tag).
#
# 15.1 uses the plain (non-cloudinit) image + console enable-ssh path, exactly
# like every other release (see conf/freebsd-15.0.conf). The BASIC-CLOUDINIT
# variant was tried but dropped.

VM_VHD_LINK="https://download.freebsd.org/releases/VM-IMAGES/15.1-RC3/amd64/Latest/FreeBSD-15.1-RC3-amd64-zfs.qcow2.xz"
VM_OS_NAME="freebsd"
VM_SSH_PORT=2222
VM_RELEASE=15.1

VM_LOGIN_TAG="64 (freebsd) (tty"

VM_SHUTDOWN_CMD="/sbin/shutdown -p now"

VM_INSTALL_CMD="IGNORE_OSVERSION=yes pkg  install  -y "

VM_RSYNC_PKG="rsync"
VM_SSHFS_PKG="fusefs-sshfs"

VM_PRE_INSTALL_PKGS="tree $VM_RSYNC_PKG $VM_SSHFS_PKG"


VM_OPTS="conf/freebsd-13.1.opts.txt"


