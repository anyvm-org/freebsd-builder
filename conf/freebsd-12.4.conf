

VM_VHD_LINK="https://archive.freebsd.org/old-releases/VM-IMAGES/12.4-RELEASE/amd64/Latest/FreeBSD-12.4-RELEASE-amd64.qcow2.xz"
VM_OS_NAME="freebsd"
VM_SSH_PORT=2222

VM_RELEASE=12.4

VM_LOGIN_TAG="64 (freebsd) (tty"

VM_SHUTDOWN_CMD="/sbin/shutdown -p now"

VM_INSTALL_CMD="pkg  install  -y "

# FreeBSD 12 is EOL and pkg.FreeBSD.org removed the FreeBSD:12 repo entirely
# (.../FreeBSD:12:amd64/.../pkg.txz returns 404), so pkg cannot even bootstrap
# here -- no package install is possible. Ship the base system only: rsync and
# sshfs sync modes need those packages and so are unavailable; scp and nfs sync
# work via the base system. build.py skips the install + verify-boot when these
# are empty.
VM_RSYNC_PKG=
VM_SSHFS_PKG=
VM_PRE_INSTALL_PKGS=

VM_OPTS="conf/freebsd-12.4.opts.txt"


VM_SYNC_METHODS="nfs,scp"
