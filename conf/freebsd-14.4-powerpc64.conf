# FreeBSD 14.4 powerpc64 (big-endian / ELFv1) on QEMU sPAPR (pseries).
#
# Unlike every other FreeBSD-builder target, there is no prebuilt
# qcow2.xz cloud image at download.freebsd.org for powerpc64 -- only
# install ISOs. So this conf takes the VM_ISO_LINK path: the install is
# driven by hooks/host_installOpts.py (scripted bsdinstall over the SPAPR
# virtual teletype, ttyu0), NOT by an OCR opts.txt. See
# ppc64-support-notes.md for the full design + gotchas.

VM_ISO_LINK="https://download.freebsd.org/releases/powerpc/powerpc64/ISO-IMAGES/14.4/FreeBSD-14.4-RELEASE-powerpc-powerpc64-disc1.iso"
VM_OS_NAME="freebsd"
VM_SSH_PORT=2222
VM_RELEASE=14.4

# Login banner after install reboots: pseries SPAPR vio uart is uart0/ttyu0
# in FreeBSD, not hvc0. host_installOpts.py sets hostname=anyvm.org via
# sysrc in the bsdinstall installerconfig, so the post-install banner reads
# "FreeBSD/powerpc (anyvm.org) (ttyu0)" -- match the unchanging suffix.
VM_LOGIN_TAG="(ttyu0)"

VM_SHUTDOWN_CMD="/sbin/shutdown -p now"

VM_INSTALL_CMD="pkg  install  -y "

# No pre-installed packages: pkg.FreeBSD.org publishes NO prebuilt
# powerpc64 repository at all (FreeBSD:13/14/15:powerpc64, quarterly and
# latest, all return 404 -- powerpc64 is Tier 2 and official package
# builds have stopped), so `pkg install` can never even bootstrap pkg
# and the install step would fail the build. Leave the package vars
# empty: build.py skips the pre-install step and the rsync/sshfs
# verification boot. The image ships the base system only -- ssh/scp
# (and scp sync in anyvm) work via base openssh; rsync and sshfs sync
# modes are unavailable on powerpc64.
VM_RSYNC_PKG=
VM_SSHFS_PKG=
VM_PRE_INSTALL_PKGS=

VM_ARCH="powerpc64"

# Force a single CPU. Under TCG, qemu-system-ppc64's pseries SMP bring-up is
# unreliable on a COLD boot from the installed disk: the install VM and the
# first post-install boot come up fine with -smp 2, but the *verification*
# VM (the third cold start of the same qcow2, booting from disk with no
# install media) reproducibly wedges at the kernel's "Launching APs: 1"
# line and never reaches multiuser -- _wait_ssh then loops forever. TCG is
# round-robin (no real parallelism) so -smp 2 buys nothing here anyway;
# pinning to 1 CPU sidesteps the AP-startup hang for every boot of this
# image.
VM_CPU=1

# pseries has only a stub VGA framebuffer; the bsdinstall TUI runs on the
# SPAPR vty (ttyu0), so we drive it via the serial-chardev console path,
# same as aarch64-console / sparc64.
VM_USE_CONSOLE_BUILD=1
VM_NO_VNC_BUILD=1

# Root password is intentionally left empty. host_installOpts.py bakes
# the host's id_rsa.pub directly into /root/.ssh/authorized_keys via the
# bsdinstall installerconfig and configures sshd with PermitRootLogin yes
# + PermitEmptyPasswords yes + StrictModes no. Default /etc/ttys on
# powerpc64 marks ttyu0 "onifconsole secure", so the post-install console
# also accepts empty-password root login -- _enable_ssh_console_branch's
# `string root; enter` + skipped password block reaches a root shell
# either way. The enablessh.local that the console branch pushes via nc
# is a redundant-but-idempotent reinforcement of what the installerconfig
# already set up.

# No VM_OPTS: the whole ISO install is driven by hooks/host_installOpts.py
# (scripted bsdinstall over the SPAPR vty), which run_hook("installOpts")
# invokes in place of the OCR-driven processOpts(VM_OPTS) path.
