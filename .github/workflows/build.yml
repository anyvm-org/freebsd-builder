name: "Build"

permissions:
  contents: write
  packages: write

on:
  push:
    branches:
      - '*'
    paths:
      - 'build.py'
      - '.github/workflows/build.yml'
      - '*.txt'
      - 'conf/*'
      - 'hooks/*'
  pull_request:
    branches:
      - '*'
    paths:
      - 'build.py'
      - '.github/workflows/build.yml'
      - '*.txt'
      - 'conf/*'
      - 'hooks/*'
  workflow_dispatch:

  release:
    types: [ created ]


concurrency: 
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true


jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: ["13.5", "13.5-aarch64", "13.5-riscv64", "13.5-powerpc64", "14.3", "14.3-aarch64", "14.3-riscv64", "14.3-powerpc64", "14.4", "14.4-aarch64", "14.4-riscv64", "14.4-powerpc64", "15.0", "15.0-aarch64", "15.0-riscv64", "15.0-powerpc64", "15.0-xfce", "15.0-gnome", "15.0-kde6", "15.1", "15.1-aarch64", "15.1-riscv64", "15.1-powerpc64"]
    runs-on: ubuntu-24.04
    steps:
#    - name: Free Disk Space (Ubuntu)
#      uses: jlumbroso/free-disk-space@main
#      with:
#        # this might remove tools that are actually needed,
#        # if set to "true" but frees about 6 GB
#        tool-cache: false
    - uses: actions/checkout@v6
    - name: Creating Web console
      uses: anyvm-org/cf-tunnel@v0
      id: tunnel
      with:
        protocol: http
        port: 8000
    - run: |
        python3 build.py conf/freebsd-${{ matrix.os }}.conf
    - name: Upload build artifacts
      uses: actions/upload-artifact@v7
      with:
        # One artifact per matrix job, so they don't collide and each can be
        # downloaded independently from the run page.
        name: freebsd-${{ matrix.os }}
        path: |
          freebsd-${{ matrix.os }}.qcow2.zst*
          freebsd-${{ matrix.os }}-id_rsa.pub
          freebsd-${{ matrix.os }}-host.id_rsa
          freebsd-${{ matrix.os }}.qemu
        if-no-files-found: warn
        # qcow2.zst is already maximally compressed; gzip-recompressing the
        # bundle just burns CPU for ~0 savings.
        compression-level: 0
        # Auto-expire to keep the repo's artifact storage quota from growing
        # unboundedly. Two days is enough for a human to grab a copy for
        # local verification; anything that needs to persist longer should
        # cut a release (which goes through the Upload Release Asset step
        # below and lives forever).
        retention-days: 2
    - name: Upload Release Asset
      if: "contains(github.ref, 'refs/tags/')"
      id: upload-release-asset
      uses: softprops/action-gh-release@v3
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        files: |
          freebsd-${{ matrix.os }}.qcow2.zst*
          freebsd-${{ matrix.os }}-id_rsa.pub
          freebsd-${{ matrix.os }}-host.id_rsa
          freebsd-${{ matrix.os }}.qemu


















